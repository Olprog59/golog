name: Auto Tag

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect keyword and create tag
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)

          if echo "$COMMIT_MSG" | grep -qi '\[patch\]'; then
            BUMP="patch"
          elif echo "$COMMIT_MSG" | grep -qi '\[minor\]'; then
            BUMP="minor"
          elif echo "$COMMIT_MSG" | grep -qi '\[major\]'; then
            BUMP="major"
          else
            echo "Aucun mot-clé [patch|minor|major] trouvé — pas de release."
            exit 0
          fi

          LATEST=$(git tag --sort=-version:refname | grep '^v' | head -1)
          [ -z "$LATEST" ] && LATEST="v0.0.0"

          VERSION=${LATEST#v}
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          case $BUMP in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Création du tag : $NEW_TAG"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
